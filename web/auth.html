<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Avryd — Sign In</title>
    <link rel="stylesheet" href="styles.css"/>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <span class="logo-dot large"></span>
                <span class="logo-text">AVRYD</span>
            </div>
            <h1 class="auth-title">Sign In to Avryd</h1>
            <p class="auth-sub">Choose your sign-in method to access your account and product key.</p>

            <div id="authButtons">
                <button class="oauth-btn google" onclick="signIn('google')">
                    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>
                <button class="oauth-btn microsoft" onclick="signIn('microsoft')">
                    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                        <path fill="#F25022" d="M0 0h11.377v11.372H0z"/>
                        <path fill="#7FBA00" d="M12.623 0H24v11.372H12.623z"/>
                        <path fill="#00A4EF" d="M0 12.628h11.377V24H0z"/>
                        <path fill="#FFB900" d="M12.623 12.628H24V24H12.623z"/>
                    </svg>
                    Continue with Microsoft
                </button>
                <button class="oauth-btn facebook" onclick="signIn('facebook')">
                    <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                        <path fill="#fff" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    Continue with Facebook
                </button>
            </div>

            <div class="auth-divider"><span>or</span></div>

            <div id="keySection">
                <p class="section-label">Already have a product key?</p>
                <input type="email" id="emailInput" placeholder="Email address" class="auth-input"
                       aria-label="Email address"/>
                <input type="text" id="keyInput" placeholder="Product key (XXXX-XXXX-XXXX-XXXX)" class="auth-input"
                       aria-label="Product key"/>
                <button class="btn-primary btn-large" onclick="validateKey()" style="width:100%;margin-top:8px;">
                    Activate Avryd
                </button>
            </div>

            <div id="statusMsg" class="status-msg" aria-live="polite" style="display:none"></div>
            <div id="loadingIndicator" class="loading" style="display:none">
                <div class="spinner"></div>
                <span id="loadingText">Signing in...</span>
            </div>

            <div id="keyDisplay" class="key-display" style="display:none">
                <h3>Your Product Key</h3>
                <div class="key-box" id="productKey" aria-label="Product key" tabindex="0"></div>
                <p class="key-hint">Copy this key and enter it in the Avryd app to activate your license.</p>
                <button class="btn-secondary" onclick="copyKey()">Copy Key</button>
                <a href="/" class="btn-ghost">← Back to Home</a>
            </div>

            <p class="auth-footer">
                <a href="/">← Back to home</a> ·
                <a href="/privacy.html">Privacy</a> ·
                <a href="/terms.html">Terms</a>
            </p>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
